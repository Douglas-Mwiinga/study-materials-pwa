<!DOCTYPE html>
<html lang="en">
<head>
        <link rel="icon" type="image/png" href="/icons/favicon-32x32.png">
        <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Up</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script>
        (function(){
            var id = 'REPLACE_WITH_VERCEL_WEBSITE_ID';
            if (!id || id === 'REPLACE_WITH_VERCEL_WEBSITE_ID') return;
            if (location.hostname === 'localhost') return;
            var s = document.createElement('script');
            s.defer = true;
            s.setAttribute('data-website-id', id);
            s.src = 'https://static.vercel-insights.com/script.js';
            document.head.appendChild(s);
        })();
    </script>
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="logo">Smart Up</div>
        </div>
    </header>
    <main>
        <section class="login-section">
            <div class="container login-container">
                <h2>Welcome Back!</h2>
                <form class="login-form">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>

                    <button type="submit" class="login-btn">Log In</button>
                </form>
                <p class="login-link">Don't have an account? <a href="signup.html">Sign up</a></p>
                <div id="errorMessage" class="error-message"></div>
            </div>
        </section>
    </main>
    <footer>
        <div class="container footer-container">
            <span>&copy; 2026 Smart Up. All rights reserved.</span>
        </div>
    </footer>
    <script type="module" src="../js/auth.js"></script>
    <script>
        function normalizeRoles(user = {}) {
            const fromArray = Array.isArray(user.roles) ? user.roles : [];
            return [...new Set([...fromArray, user.role].filter(Boolean))];
        }

        document.querySelector('.login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = document.querySelector('.login-btn');
            
            // Clear previous errors
            errorDiv.classList.remove('show');
            errorDiv.textContent = '';
            
            // Disable button during request
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            
            try {
                const response = await login(email, password);
                const roles = normalizeRoles(response?.user || {});
                const hasAdmin = roles.includes('admin');
                const hasTutor = roles.includes('tutor');
                
                // Success - redirect based on role
                if (hasTutor) {
                    window.location.href = 'dashboard.html';
                } else if (hasAdmin) {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'materials.html';
                }
            } catch (error) {
                // Show error message
                errorDiv.textContent = error.message || 'Login failed. Please check your credentials.';
                errorDiv.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log In';
            }
        });
    </script>
</body>
</html>
