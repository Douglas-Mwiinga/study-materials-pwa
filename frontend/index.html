<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Up</title>
  <meta http-equiv="refresh" content="0; url=/pages/login.html">
  <script>
    window.location.replace('/pages/login.html');
  </script>
  <script>
    (function(){
      var id = 'REPLACE_WITH_VERCEL_WEBSITE_ID';
      if (!id || id === 'REPLACE_WITH_VERCEL_WEBSITE_ID') return;
      if (location.hostname === 'localhost') return;
      var s = document.createElement('script');
      s.defer = true;
      s.setAttribute('data-website-id', id);
      s.src = 'https://static.vercel-insights.com/script.js';
      document.head.appendChild(s);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="/pages/login.html">/pages/login.html</a>...</p>
</body>
</html>
