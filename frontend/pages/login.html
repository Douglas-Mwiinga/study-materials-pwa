<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Up</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="logo">Smart Up</div>
        </div>
    </header>
    <main>
        <section class="login-section">
            <div class="container login-container">
                <h2>Welcome Back!</h2>
                <form class="login-form">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>

                    <button type="submit" class="login-btn">Log In</button>
                </form>
                <p class="login-link">Don't have an account? <a href="signup.html">Sign up</a></p>
                <div id="errorMessage" class="error-message"></div>
            </div>
        </section>
    </main>
    <footer>
        <div class="container footer-container">
            <span>&copy; 2026 Smart Up. All rights reserved.</span>
        </div>
    </footer>
    <script src="../js/auth.js"></script>
    <script>
        document.querySelector('.login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = document.querySelector('.login-btn');
            
            // Clear previous errors
            errorDiv.classList.remove('show');
            errorDiv.textContent = '';
            
            // Disable button during request
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            
            try {
                const response = await login(email, password);
                
                // Success - redirect based on role
                const role = response.user?.role || getUserRole();
                
                if (role === 'tutor') {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'materials.html';
                }
            } catch (error) {
                // Show error message
                errorDiv.textContent = error.message || 'Login failed. Please check your credentials.';
                errorDiv.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log In';
            }
        });
    </script>
</body>
</html>
