<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Smart Up</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="logo">Smart Up</div>
        </div>
    </header>
    <main>
        <section class="login-section">
            <div class="container login-container">
                <h2>Create Your Account</h2>
                <form class="login-form">
                    <label for="name" id="nameLabel">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>

                    <label for="role">User Role</label>
                    <select id="role" name="role" required>
                        <option value="">Select role</option>
                        <option value="tutor">Tutor</option>
                        <option value="student">Student</option>

                    </select>

                    <div id="tutorialGroupContainer" style="display: none;">
                        <label for="tutorialGroup">Tutorial Group Name</label>
                        <input type="text" id="tutorialGroup" name="tutorialGroup" placeholder="e.g., Math 101, Chemistry Advanced" required>
                        <small style="display: block; color: #666; margin-top: 5px;">Which tutorial group are you joining?</small>
                    </div>

                    <div id="paymentScreenshotContainer" style="display: none;">
                        <label for="paymentScreenshot">Payment Proof (Screenshot)</label>
                        <input type="file" id="paymentScreenshot" name="paymentScreenshot" accept="image/*" required>
                        <small style="display: block; color: #666; margin-top: 5px;">Upload a screenshot of your payment confirmation</small>
                    </div>

                    <button type="submit" class="login-btn">Sign Up</button>
                </form>
                <p class="login-link">Already have an account? <a href="login.html">Log in</a></p>
                <div id="errorMessage" class="error-message" style="display: none; color: #d32f2f; margin-top: 15px; padding: 10px; background: #ffebee; border-radius: 4px;"></div>
            </div>
        </section>
    </main>
    <footer>
        <div class="container footer-container">
            <span>&copy; 2026 Smart Up. All rights reserved.</span>
        </div>
    </footer>
    <script src="../js/auth.js"></script>
    <script>
        // Dynamic label switching based on user role
        const roleSelect = document.getElementById('role');
        const nameLabel = document.getElementById('nameLabel');
        const nameInput = document.getElementById('name');
        const paymentScreenshotContainer = document.getElementById('paymentScreenshotContainer');
        const paymentScreenshotInput = document.getElementById('paymentScreenshot');
        const tutorialGroupContainer = document.getElementById('tutorialGroupContainer');
        const tutorialGroupInput = document.getElementById('tutorialGroup');

        function updateNameLabel() {
            const selectedRole = roleSelect.value;
            if (selectedRole === 'tutor') {
                nameLabel.textContent = 'Tutorials Group Name';
                nameInput.placeholder = 'Enter your tutorials group name';
                paymentScreenshotContainer.style.display = 'none';
                paymentScreenshotInput.required = false;
                tutorialGroupContainer.style.display = 'none';
                tutorialGroupInput.required = false;
            } else if (selectedRole === 'student') {
                nameLabel.textContent = 'Full Name';
                nameInput.placeholder = 'Enter your full name';
                paymentScreenshotContainer.style.display = 'block';
                paymentScreenshotInput.required = true;
                tutorialGroupContainer.style.display = 'block';
                tutorialGroupInput.required = true;
            } else {
                nameLabel.textContent = 'Full Name';
                nameInput.placeholder = 'Enter your full name';
                paymentScreenshotContainer.style.display = 'none';
                paymentScreenshotInput.required = false;
                tutorialGroupContainer.style.display = 'none';
                tutorialGroupInput.required = false;
            }
        }

        // Update label when role changes
        roleSelect.addEventListener('change', updateNameLabel);

        // Initialize on page load
        updateNameLabel();

        document.querySelector('.login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const paymentScreenshot = document.getElementById('paymentScreenshot').files[0] || null;
            const tutorialGroup = role === 'student' ? document.getElementById('tutorialGroup').value : null;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = document.querySelector('.login-btn');
            
            // Clear previous errors
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            
            // Validate role
            if (!role) {
                errorDiv.textContent = 'Please select a user role';
                errorDiv.style.display = 'block';
                return;
            }

            // Validate payment screenshot for students
            if (role === 'student' && !paymentScreenshot) {
                errorDiv.textContent = 'Students must upload a payment proof screenshot';
                errorDiv.style.display = 'block';
                return;
            }

            // Validate tutorial group for students
            if (role === 'student' && !tutorialGroup) {
                errorDiv.textContent = 'Students must specify which tutorial group they are joining';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Disable button during request
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing up...';
            
            try {
                await signup(email, password, role, name, paymentScreenshot, tutorialGroup);
                
                // Success - redirect to login
                alert('Account created successfully! Please log in.');
                window.location.href = 'login.html';
            } catch (error) {
                // Show error message
                errorDiv.textContent = error.message || 'Signup failed. Please try again.';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign Up';
            }
        });
    </script>
</body>
</html>
