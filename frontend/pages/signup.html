<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/icons/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Smart Up</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="logo">Smart Up</div>
        </div>
    </header>
    <main>
        <section class="login-section">
            <div class="container login-container">
                <h2>Create Your Account</h2>
                <form class="login-form">
                    <label for="name" id="nameLabel">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>

                    <label for="role">User Role</label>
                    <select id="role" name="role" required>
                        <option value="">Select role</option>
                        <option value="tutor">Tutor</option>
                        <option value="student">Student</option>

                    </select>

                    <div id="tutorialGroupContainer" class="hidden-section">
                        <label for="tutorialGroup">Tutorial Group Name</label>
                        <input type="text" id="tutorialGroup" name="tutorialGroup" placeholder="e.g., Math 101, Chemistry Advanced">
                        <small class="help-text">Which tutorial group do you manage?</small>
                    </div>

                    <div id="tutorSelectContainer" class="hidden-section">
                        <label for="tutorSelect">Select Your Tutor</label>
                        <select id="tutorSelect" name="tutorSelect">
                            <option value="">Loading tutors...</option>
                        </select>
                        <small class="help-text">Select the tutor whose group you are joining</small>
                    </div>

                    <div id="paymentScreenshotContainer" class="hidden-section">
                        <label for="paymentScreenshot">Payment Proof (Screenshot)</label>
                        <input type="file" id="paymentScreenshot" name="paymentScreenshot" accept="image/*" required>
                        <small class="help-text">Upload a screenshot of your payment confirmation</small>
                    </div>

                    <button type="submit" class="login-btn">Sign Up</button>
                </form>
                <p class="login-link">Already have an account? <a href="login.html">Log in</a></p>
                <div id="errorMessage" class="error-message"></div>
            </div>
        </section>
    </main>
    <footer>
        <div class="container footer-container">
            <span>&copy; 2026 Smart Up. All rights reserved.</span>
        </div>
    </footer>
    <script type="module" src="../js/auth.js"></script>
    <script>
        // Dynamic label switching based on user role
        const roleSelect = document.getElementById('role');
        const nameLabel = document.getElementById('nameLabel');
        const nameInput = document.getElementById('name');
        const paymentScreenshotContainer = document.getElementById('paymentScreenshotContainer');
        const paymentScreenshotInput = document.getElementById('paymentScreenshot');
        const tutorialGroupContainer = document.getElementById('tutorialGroupContainer');
        const tutorialGroupInput = document.getElementById('tutorialGroup');

        const tutorSelectContainer = document.getElementById('tutorSelectContainer');
        const tutorSelect = document.getElementById('tutorSelect');
        let tutorsLoaded = false;

        async function loadTutors() {
            if (tutorsLoaded) return;
            try {
                const res = await fetch('/api/student-access/tutors');
                const result = await res.json();
                const tutors = result.tutors || [];
                if (tutors.length === 0) {
                    tutorSelect.innerHTML = '<option value="">No tutors available yet</option>';
                } else {
                    tutorSelect.innerHTML = '<option value="">-- Select your tutor --</option>' +
                        tutors.map(t => `<option value="${t.id}">${t.name} (${t.tutorial_group || 'No group'})</option>`).join('');
                }
                tutorsLoaded = true;
            } catch (e) {
                tutorSelect.innerHTML = '<option value="">Failed to load tutors</option>';
            }
        }

        function updateNameLabel() {
            const selectedRole = roleSelect.value;
            if (selectedRole === 'tutor') {
                paymentScreenshotContainer.style.display = 'none';
                paymentScreenshotInput.required = false;
                tutorialGroupContainer.style.display = 'block';
                tutorialGroupInput.required = true;
                tutorSelectContainer.style.display = 'none';
                tutorSelect.required = false;
            } else if (selectedRole === 'student') {
                paymentScreenshotContainer.style.display = 'block';
                paymentScreenshotInput.required = true;
                tutorialGroupContainer.style.display = 'none';
                tutorialGroupInput.required = false;
                tutorSelectContainer.style.display = 'block';
                tutorSelect.required = true;
                loadTutors();
            } else {
                paymentScreenshotContainer.style.display = 'none';
                paymentScreenshotInput.required = false;
                tutorialGroupContainer.style.display = 'none';
                tutorialGroupInput.required = false;
                tutorSelectContainer.style.display = 'none';
                tutorSelect.required = false;
            }
        }

        // Update label when role changes
        roleSelect.addEventListener('change', updateNameLabel);

        // Initialize on page load
        updateNameLabel();

        document.querySelector('.login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const paymentScreenshot = document.getElementById('paymentScreenshot').files[0] || null;
            const tutorialGroup = document.getElementById('tutorialGroup').value || null;
            const selectedTutorId = document.getElementById('tutorSelect').value || null;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = document.querySelector('.login-btn');
            
            // Clear previous errors
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            
            // Validate role
            if (!role) {
                errorDiv.textContent = 'Please select a user role';
                errorDiv.style.display = 'block';
                return;
            }

            // Validate payment screenshot for students
            if (role === 'student' && !paymentScreenshot) {
                errorDiv.textContent = 'Students must upload a payment proof screenshot';
                errorDiv.style.display = 'block';
                return;
            }

            // Validate tutor selection for students
            if (role === 'student' && !selectedTutorId) {
                errorDiv.textContent = 'Please select your tutor from the dropdown';
                errorDiv.style.display = 'block';
                return;
            }

            // Validate tutorial group for tutors
            if (role === 'tutor' && !tutorialGroup) {
                errorDiv.textContent = 'Tutors must specify which tutorial group they manage';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Disable button during request
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing up...';
            
            try {
                await signup(email, password, role, name, paymentScreenshot, tutorialGroup, selectedTutorId);
                
                // Success - redirect to login
                alert('Account created successfully! Please log in.');
                window.location.href = 'login.html';
            } catch (error) {
                // Show error message
                errorDiv.textContent = error.message || 'Signup failed. Please try again.';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign Up';
            }
        });
    </script>
</body>
</html>
